services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fblite}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fblite}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - private

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      ALLOWED_GOOGLE_DOMAIN: ${ALLOWED_GOOGLE_DOMAIN}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_HTTPS_ONLY: "true"
      SESSION_SAME_SITE: "lax"
      FRONTEND_ORIGIN: https://${APP_DOMAIN}
      CORS_ALLOW_INTERNAL_REGEX: "false"
      DEV_AUTH_BYPASS: "false"
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID}
      PLAID_SECRET: ${PLAID_SECRET}
      PLAID_ENV: ${PLAID_ENV:-production}
      PLAID_PRODUCTS: ${PLAID_PRODUCTS:-transactions}
      PLAID_COUNTRY_CODES: ${PLAID_COUNTRY_CODES:-US}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      TIMESHEET_REMINDER_ENABLED: ${TIMESHEET_REMINDER_ENABLED:-false}
      TIMESHEET_REMINDER_HOUR_LOCAL: ${TIMESHEET_REMINDER_HOUR_LOCAL:-15}
      TIMESHEET_REMINDER_MINUTE_LOCAL: ${TIMESHEET_REMINDER_MINUTE_LOCAL:-0}
      TIMESHEET_REMINDER_TIMEZONE: ${TIMESHEET_REMINDER_TIMEZONE:-America/New_York}
      RECURRING_INVOICE_ENABLED: ${RECURRING_INVOICE_ENABLED:-true}
      RECURRING_INVOICE_RUN_HOUR_LOCAL: ${RECURRING_INVOICE_RUN_HOUR_LOCAL:-8}
      RECURRING_INVOICE_RUN_MINUTE_LOCAL: ${RECURRING_INVOICE_RUN_MINUTE_LOCAL:-5}
      RECURRING_INVOICE_TIMEZONE: ${RECURRING_INVOICE_TIMEZONE:-America/New_York}
      PAYMENT_LINK_DEFAULT_EXPIRY_DAYS: ${PAYMENT_LINK_DEFAULT_EXPIRY_DAYS:-14}
      PAYMENT_LINKS_ENABLED: ${PAYMENT_LINKS_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - private

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE: auto
      NEXT_PUBLIC_DEV_AUTH_BYPASS: "false"
      BACKEND_INTERNAL_BASE: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    networks:
      - private

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
    networks:
      - private

  db-backup:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-fblite}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "-c", "while true; do /scripts/backup_postgres.sh; sleep 86400; done"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - private

volumes:
  db_data:
  caddy_data:
  caddy_config:

networks:
  private:
    driver: bridge

