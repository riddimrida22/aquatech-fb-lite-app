groups:
  - name: aquatech-availability
    interval: 30s
    rules:
      - alert: AppEndpointDown
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
          service: aquatechpm
        annotations:
          summary: "Endpoint down: {{ $labels.instance }}"
          description: "Blackbox probe has failed for more than 2 minutes."

      - alert: AppEndpointHighLatency
        expr: probe_duration_seconds{job="blackbox-http"} > 2.5
        for: 5m
        labels:
          severity: warning
          service: aquatechpm
        annotations:
          summary: "High latency: {{ $labels.instance }}"
          description: "Probe latency above 2.5s for more than 5 minutes."
