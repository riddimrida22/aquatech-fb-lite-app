name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      target_commit:
        description: "Commit SHA/ref to deploy (default: current workflow SHA)"
        required: false
        type: string
      run_rollback:
        description: "Run rollback instead of deploy"
        required: true
        default: false
        type: boolean
      rollback_target:
        description: "Rollback target environment"
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

jobs:
  validate:
    if: ${{ !inputs.run_rollback }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend integration tests
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          DATABASE_URL: sqlite:////tmp/aquatech_ci_deploy.db
          SESSION_SECRET: ci-deploy-secret
          ALLOWED_GOOGLE_DOMAIN: aquatechpc.com
          DEV_AUTH_BYPASS: "true"
          FRONTEND_ORIGIN: http://localhost:3000
        run: pytest -q tests/test_mvp.py tests/test_financial_flows.py

  deploy-staging:
    if: ${{ !inputs.run_rollback }}
    needs: validate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      - name: Deploy to staging
        env:
          TARGET_REF: ${{ inputs.target_commit || github.sha }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
        run: |
          set -euo pipefail
          # Staging is optional; do not fail full deploy when staging env is not configured.
          if [ -z "${STAGING_HOST:-}" ] || [ -z "${STAGING_USER:-}" ] || [ -z "${STAGING_APP_DIR:-}" ]; then
            echo "Skipping staging deploy: staging host/user/app-dir secrets are not fully configured."
            exit 0
          fi
          ssh -o StrictHostKeyChecking=no "$STAGING_USER@$STAGING_HOST" "cd '$STAGING_APP_DIR' && git fetch --all --tags --prune && if [ -f .env.staging ]; then DEPLOY_ENV_FILE=.env.staging; else DEPLOY_ENV_FILE=.env.prod; fi && echo Using env file: \$DEPLOY_ENV_FILE && ALLOW_SKIP_CADDY_ON_443_CONFLICT=true FORCE_TAKEOVER_443=true RUN_GATE=false ./scripts/deploy_from_commit.sh '$TARGET_REF' \"\$DEPLOY_ENV_FILE\""

      - name: Staging runtime monitor
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
          STAGING_APP_BASE_URL: ${{ secrets.STAGING_APP_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${STAGING_HOST:-}" ] || [ -z "${STAGING_USER:-}" ] || [ -z "${STAGING_APP_DIR:-}" ] || [ -z "${STAGING_APP_BASE_URL:-}" ]; then
            echo "Skipping staging monitor: staging secrets are not fully configured."
            exit 0
          fi
          ssh -o StrictHostKeyChecking=no "$STAGING_USER@$STAGING_HOST" "cd '$STAGING_APP_DIR' && CHECK_RETRIES=4 RETRY_DELAY_S=3 APP_BASE_URL='$STAGING_APP_BASE_URL' API_BASE_URL='${STAGING_APP_BASE_URL}/api' ./scripts/ops_monitor.sh"

  deploy-production:
    needs:
      - validate
      - deploy-staging
    # Keep staging as a best-practice gate, but still allow production deploy when
    # staging is temporarily unavailable (for example, host/SSH issues).
    if: ${{ !inputs.run_rollback && always() && needs.validate.result == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Deploy to production
        env:
          TARGET_REF: ${{ inputs.target_commit || github.sha }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          FALLBACK_PROD_HOST: 136.107.22.231
          FALLBACK_PROD_USER: bertrand_byrne
          FALLBACK_PROD_APP_DIR: /opt/AquatechPM
        run: |
          set -euo pipefail
          DEPLOY_HOST="${PROD_HOST:-$FALLBACK_PROD_HOST}"
          DEPLOY_USER="${PROD_USER:-$FALLBACK_PROD_USER}"
          DEPLOY_APP_DIR="${PROD_APP_DIR:-$FALLBACK_PROD_APP_DIR}"
          [ -n "${DEPLOY_HOST:-}" ] || { echo "Missing production host configuration"; exit 1; }
          [ -n "${DEPLOY_USER:-}" ] || { echo "Missing production user configuration"; exit 1; }
          [ -n "${DEPLOY_APP_DIR:-}" ] || { echo "Missing production app-dir configuration"; exit 1; }
          ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_APP_DIR' && git fetch --all --tags --prune && ALLOW_SKIP_CADDY_ON_443_CONFLICT=true FORCE_TAKEOVER_443=true RUN_GATE=false ./scripts/deploy_from_commit.sh '$TARGET_REF' .env.prod"

      - name: Production runtime monitor
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          PROD_APP_BASE_URL: ${{ secrets.PROD_APP_BASE_URL }}
          FALLBACK_PROD_HOST: 136.107.22.231
          FALLBACK_PROD_USER: bertrand_byrne
          FALLBACK_PROD_APP_DIR: /opt/AquatechPM
          FALLBACK_PROD_APP_BASE_URL: https://app.aquatechpc.com
        run: |
          set -euo pipefail
          DEPLOY_HOST="${PROD_HOST:-$FALLBACK_PROD_HOST}"
          DEPLOY_USER="${PROD_USER:-$FALLBACK_PROD_USER}"
          DEPLOY_APP_DIR="${PROD_APP_DIR:-$FALLBACK_PROD_APP_DIR}"
          APP_BASE_URL="${PROD_APP_BASE_URL:-$FALLBACK_PROD_APP_BASE_URL}"
          ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" "cd '$DEPLOY_APP_DIR' && CHECK_RETRIES=4 RETRY_DELAY_S=3 APP_BASE_URL='$APP_BASE_URL' API_BASE_URL='${APP_BASE_URL}/api' ./scripts/ops_monitor.sh"

  rollback:
    if: ${{ inputs.run_rollback }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.rollback_target }}
    steps:
      - name: Start SSH agent (staging)
        if: ${{ inputs.rollback_target == 'staging' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      - name: Start SSH agent (production)
        if: ${{ inputs.rollback_target == 'production' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Rollback staging
        if: ${{ inputs.rollback_target == 'staging' }}
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no "$STAGING_USER@$STAGING_HOST" "cd '$STAGING_APP_DIR' && ./scripts/rollback_last_deploy.sh .env.prod"

      - name: Rollback production
        if: ${{ inputs.rollback_target == 'production' }}
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no "$PROD_USER@$PROD_HOST" "cd '$PROD_APP_DIR' && ./scripts/rollback_last_deploy.sh .env.prod"
